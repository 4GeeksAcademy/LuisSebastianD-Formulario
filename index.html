<!doctype html>
<html>

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" rel="stylesheet">
    <title>Payment form</title>
</head>

<body>
    <main>
        <form class="m-5">
            <div class="card m-5">
                <!-- Título -->
                <div class="card-header">
                    <h3 class="my-1">Payment form example</h3>
                </div>
                <div class="card-body">
                    <div class="container-fluid m-0 p-0">
                        <!-- Mensaje -->
                        <div class="row mb-3">
                            <div class="col-12">
                                <div
                                    class="p-3 bg-danger-subtle text-danger-emphasis border border-danger-subtle rounded-2">
                                    <h6 class="m-0">Some fields are missing</h6>
                                </div>
                            </div>
                        </div>
                        <!-- Fila 1 -->
                        <div class="row mb-3">
                            <div class="col-5">
                                <label class="form-label" for="tarjeta">Card #</label>
                                <input class="form-control" type="number" name="tarjeta" placeholder="XXXXXXXXXXXXXXXX" min="1000000000000000" max="9999999999999999" required>
                            </div>
                            <div class="col-3">
                                <label class="form-label" for="cvc">CVC #</label>
                                <input class="form-control" type="number" name="cvc" placeholder="0000" min="1000" max="9999" required>
                            </div>
                            <div class="col-4">
                                <label class="form-label" for="monto">Amount</label>
                                <div class="d-flex">
                                    <i class="fa-solid fa-dollar-sign"></i>
                                    <input class="form-control" type="number" name="monto" placeholder="Amount" required>
                                </div>
                            </div>
                        </div>
                        <!-- Fila 2 -->
                        <div class="row mb-3">
                            <div class="col">
                                <label class="form-label" for="firstname">First Name</label>
                                <input class="form-control" type="text" name="firstname" required>
                            </div>
                            <div class="col">
                                <label class="form-label" for="lastname">Last Name</label>
                                <input class="form-control" type="text" name="lastname" required>
                            </div>
                        </div>
                        <!-- Fila 3 -->
                        <div class="row mb-3">
                            <div class="col">
                                <label class="form-label" for="ciudad">City</label>
                                <input class="form-control" type="text" name="ciudad">
                            </div>
                            <div class="col">
                                <div class="row">
                                    <div class="col">
                                        <label class="form-label" for="estado">State</label>
                                        <select class="form-select" name="estado">
                                            <option selected>Pick a state</option>
                                        </select>
                                    </div>
                                    <div class="col">
                                        <label class="form-label" for="postal">Postal Code</label>
                                        <input class="form-control" type="number" name="postal">
                                    </div>
                                </div>
                            </div>
                        </div>
                        <!-- Fila 4 -->
                        <div class="row justify-content-between">
                            <div class="col-auto">
                                <p>We accept:</p>
                                <div class="d-flex text-bg-secondary rounded-1 p-2">
                                    <div class="form-check ps-0">
                                        <input type="radio" id="mastercard" name="tipo-de-pago" checked>
                                        <i class="fa-brands fa-cc-mastercard fa-lg"></i>
                                    </div>
                                    <div class="form-check">
                                        <input type="radio" id="visa" name="tipo-de-pago">
                                        <i class="fa-brands fa-cc-visa fa-lg"></i>
                                    </div>
                                    <div class="form-check">
                                        <input type="radio" id="dinersclub" name="tipo-de-pago">
                                        <i class="fa-brands fa-cc-diners-club fa-lg"></i>
                                    </div>
                                    <div class="form-check">
                                        <input type="radio" id="americanexpress" name="tipo-de-pago">
                                        <i class="fa-brands fa-cc-amex fa-lg"></i>
                                    </div>
                                </div>
                            </div>
                            <div class="col-6">
                                <label class="form-label" for="mensaje">Message</label>
                                <textarea class="form-control" name="mensaje" rows="3"></textarea>
                                <div class="form-text">Add any notes here.</div>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Botones -->
                <div class="card-footer text-end">
                    <button type="button" class="btn btn-secondary">Cancel</button>
                    <button type="submit" class="btn btn-primary">Send</button>
                </div>
            </div>
        </form>
    </main>
</body>

</html>
